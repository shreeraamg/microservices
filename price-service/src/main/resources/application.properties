spring.application.name=price-service
server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/microservices

# -- Price service configuration (ConfigMap candidates) ------------------
# Accepted ISO 4217 currency codes; any other value is rejected with 400
# K8s env var override: APP_PRICE_SUPPORTED_CURRENCIES (comma-separated)
app.price.supported-currencies=USD,EUR,GBP,INR

# Maximum prices returned by GET /api/prices
# K8s env var override: APP_PRICE_MAX_RESULTS
app.price.max-results=200
