spring.application.name=location-service
server.port=8070

spring.data.mongodb.uri=mongodb://localhost:27017/location_db

# -- Location service configuration (ConfigMap candidates) ---------------
# Maximum locations returned by GET /api/locations
# K8s env var override: APP_LOCATION_MAX_RESULTS
app.location.max-results=100

# When true, POST /api/locations requires latitude and longitude
# K8s env var override: APP_LOCATION_COORDINATES_REQUIRED
app.location.coordinates-required=false
