spring.application.name=product-service
server.port=8090

spring.data.mongodb.uri=mongodb://localhost:27017/microservices

# -- Product service configuration (ConfigMap candidates) ----------------
# Maximum products returned by GET /api/products
# K8s env var override: APP_PRODUCT_MAX_RESULTS
app.product.max-results=50

# Reject create requests whose SKU already exists in the database
# K8s env var override: APP_PRODUCT_ENFORCE_UNIQUE_SKU
app.product.enforce-unique-sku=true
